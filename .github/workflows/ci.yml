name: CI

# Triggers on every push and PR. The daily.yml workflow is for scheduled
# data refresh + publish; this workflow is what gates code changes.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Default to least privilege; the lint/test job needs no token writes.
permissions:
  contents: read

# Cancel superseded runs on the same branch/PR — devs push often, no point
# burning minutes on stale commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install deps (incl. dev)
        run: uv sync --frozen --all-extras

      - name: ruff check
        run: uv run ruff check src tests

      - name: ruff check validation scripts
        run: uv run ruff check scripts/validation_lib.py scripts/run_validation.py scripts/oos_backtest.py scripts/grid_search_weights.py

      - name: ruff format --check
        # Fails CI when committed code drifts from the formatter — keeps
        # diffs clean without anyone having to remember to run it locally.
        run: uv run ruff format --check src tests

      - name: ruff format --check validation scripts
        run: uv run ruff format --check scripts/validation_lib.py scripts/run_validation.py scripts/oos_backtest.py scripts/grid_search_weights.py

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # We pin the floor in pyproject (>=3.11). Test the floor + the
        # current stable release so a 3.13-only regression is caught early.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install deps (incl. dev)
        run: uv sync --frozen --all-extras --python ${{ matrix.python-version }}

      - name: Run pytest
        # All tests are offline (VCR cassettes for HTTP, fixtures for parquet).
        # If a test ever hits the network in CI, it will time-out — that's by design.
        # --benchmark-disable: still runs benchmark tests once for correctness,
        # but skips the multi-round timing loop that pushes CI past the 10-min cap.
        run: uv run pytest -q --benchmark-disable --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact (py${{ matrix.python-version }})
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 1

  coverage-report:
    name: Diff Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-py*
          merge-multiple: true
          path: .

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen --all-extras

      - name: Run diff-cover
        run: |
          uv run diff-cover coverage.xml --compare-branch=origin/main --fail-under=0 --html-report=diff-cover.html || true
          echo "### Diff Coverage" >> $GITHUB_STEP_SUMMARY
          uv run diff-cover coverage.xml --compare-branch=origin/main --fail-under=0 --markdown-report=/tmp/dc.md || true
          cat /tmp/dc.md >> $GITHUB_STEP_SUMMARY

  eval-gate:
    name: Eval Gate (champion-challenger)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run on PRs (not push to main); the gate compares challenger vs champion.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Check if eval-relevant paths changed
        id: paths
        uses: dorny/paths-filter@v3
        with:
          filters: |
            eval-trigger:
              - 'config/weights.yaml'
              - 'src/finsynapse/transform/**'
              - 'src/finsynapse/eval/**'
              - 'scripts/validation_lib.py'

      - name: Install uv
        if: steps.paths.outputs.eval-trigger == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install deps
        if: steps.paths.outputs.eval-trigger == 'true'
        run: uv sync --frozen --all-extras

      - name: Run benchmark suite
        if: steps.paths.outputs.eval-trigger == 'true'
        run: |
          uv run python -m finsynapse.eval.suite \
            --silver tests/fixtures/eval_silver_2026Q1 \
            --weights config/weights.yaml \
            --out /tmp/latest.json

      - name: Run champion-challenger gate
        if: steps.paths.outputs.eval-trigger == 'true'
        run: |
          uv run python -m finsynapse.eval.gate \
            --champion eval/champion.json \
            --challenger /tmp/latest.json

      - name: Check for improvement hints
        if: steps.paths.outputs.eval-trigger == 'true'
        run: |
          python -c "
          import json
          champ = json.load(open('eval/champion.json'))
          chal = json.load(open('/tmp/latest.json'))
          ms = champ.get('metrics', {})
          mc = chal.get('metrics', {})
          improved = []
          for k in ms:
              cv = ms[k]
              nv = mc.get(k)
              if cv is not None and nv is not None and isinstance(cv, (int, float)) and isinstance(nv, (int, float)):
                  delta = nv - cv
                  if delta >= 0.01:
                      improved.append(f'{k}: {cv:+.4f} -> {nv:+.4f} (Δ{delta:+.4f})')
          if improved:
              print('::notice::Metrics improved vs champion:')
              for line in improved:
                  print(f'  {line}')
          " || true
