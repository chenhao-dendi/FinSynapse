name: Daily ingest + dashboard publish

# Triggers:
#  - schedule: every day at 22:00 UTC = 06:00 BJT (after A-share close,
#    ~1h after US close).
#  - workflow_dispatch: manual run from the Actions UI for testing.
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write   # push to gh-pages
  issues: write     # open issue on failure

concurrency:
  group: daily
  cancel-in-progress: false  # never cancel a partial-data publish

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync --frozen

      - name: Ingest all sources (bronze)
        env:
          # FRED key is the only ingest secret. AkShare/yfinance/multpl
          # need no auth. LLM keys NEVER live in CI per plan §0.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: uv run finsynapse ingest all --lookback-days 5500

      - name: Transform bronze -> silver (incl. temperature, divergence, health)
        run: uv run finsynapse transform run --layer all

      - name: Render bilingual static dashboard
        run: uv run finsynapse dashboard render --out-dir dist

      - name: Push state-change notifications (skipped if no secrets)
        env:
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run finsynapse notify check

      - name: Upload silver as artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: silver-${{ github.run_id }}
          path: data/silver/
          retention-days: 30

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "publish dashboard ${{ github.run_number }}"
          # Don't keep history bloated — squash to one commit per push.
          force_orphan: true

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI] Daily ingest failed ${today}`,
              labels: ['ci-failure', 'auto'],
              body: [
                `Daily workflow failed.`,
                ``,
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `Likely culprits:`,
                `- AkShare upstream rename / EastMoney scrape break`,
                `- multpl HTML structure change`,
                `- yfinance rate-limit (curl-cffi backoff)`,
                `- FRED secret missing/expired`,
                ``,
                `Re-run from the Actions UI once root cause is fixed.`,
              ].join('\n')
            });
