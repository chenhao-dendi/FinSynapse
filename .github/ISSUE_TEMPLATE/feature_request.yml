name: ✨ Feature / 想法
description: 新数据源、新指标、新背离对、新可视、新报告...
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: 动机
      description: 这个东西解决什么问题、能让我看见什么之前看不见的？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 设想方案
      description: 简单画一下数据流 / 指标公式 / UI 草图

  - type: dropdown
    id: scope
    attributes:
      label: 涉及哪一层
      multiple: true
      options:
        - 数据源 (新 provider)
        - 指标 (percentile / temperature 权重)
        - 信号 (新 divergence pair / 新检测器)
        - 可视化 (dashboard chart / 模板)
        - 报告 (brief / LLM prompt)
        - notify (新通道 / 新事件)
        - 工程 (CI / packaging / DX)

  - type: textarea
    id: alternatives
    attributes:
      label: 想过的替代方案
      description: 比如：用 X 数据源代替 Y、为什么不用 statistical anomaly detection
